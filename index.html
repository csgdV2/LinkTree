<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.17/dist/lenis.css">
    <script src="https://unpkg.com/lenis@1.3.17/dist/lenis.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="avatar">
                <img src="logo.webp" alt="Logo">
            </div>
            <h1 class="title">csgd</h1>
            <p class="subtitle">Connect with me on social media</p>
        </div>

        <div class="links-container">
            <a href="https://www.youtube.com/@csgdV2" target="_blank" class="link-card youtube">
                <div class="icon-wrapper">
                    <i class="fab fa-youtube"></i>
                </div>
                <span class="link-text">csgd</span>
            </a>

            <a href="https://www.youtube.com/@csgdtoo" target="_blank" class="link-card youtube-alt">
                <div class="icon-wrapper">
                    <i class="fab fa-youtube"></i>
                </div>
                <span class="link-text">csToo</span>
            </a>

            <a href="https://www.twitch.tv/csgdV2" target="_blank" class="link-card twitch">
                <div class="icon-wrapper">
                    <i class="fab fa-twitch"></i>
                </div>
                <span class="link-text">Twitch</span>
            </a>
            <a href="https://www.instagram.com/csgdhere" target="_blank" class="link-card instagram">
                <div class="icon-wrapper">
                    <i class="fab fa-instagram"></i>
                </div>
                <span class="link-text">Instagram</span>
            </a>
            <a href="https://x.com/csgdV2" target="_blank" class="link-card x">
                <div class="icon-wrapper">
                    <i class="fa-brands fa-x-twitter"></i>
                </div>
                <span class="link-text">X</span>
            </a>
        </div>

        <div class="footer">
            <p>Made with <i class="fas fa-heart"></i> in 2026</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="scroll.js"></script>

</body>
</html>
